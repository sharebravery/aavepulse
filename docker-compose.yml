services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aavepulse}
      POSTGRES_USER: ${POSTGRES_USER:-aavepulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aavepulse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - aavepulse-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  aavepulse-postgres:
